server {
    listen 80 default_server;
    server_name _;

    location / {
         return 444;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 80;
    server_name api.testora.svivanovic.org;

    location / {
         return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
   
}

server {
    listen 80;
    server_name www.testora.svivanovic.org;

    location / {
         return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
